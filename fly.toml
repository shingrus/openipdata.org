# fly.toml app configuration file generated for openipdata-org on 2026-03-09T23:11:08Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'openipdata-org'
primary_region = 'lhr'

[build]

[http_service]
  internal_port = 9090
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024

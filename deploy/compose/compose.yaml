services:
  app:
    image: ${IMAGE_REPOSITORY:?set IMAGE_REPOSITORY}:${IMAGE_TAG:?set IMAGE_TAG}
    restart: unless-stopped
    init: true
    network_mode: host
    env_file:
      - /etc/openipdata/openipdata.env
    environment:
      HOST: 0.0.0.0
      NODE_ENV: production
      PORT: "9090"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - /var/lib/:/var/lib/
    read_only: true
    tmpfs:
      - /tmp
    stop_grace_period: 15s
    stop_signal: SIGTERM
    logging:
      driver: json-file
      options:
        max-file: "3"
        max-size: 10m

networks:
  default:
    enable_ipv6: true
